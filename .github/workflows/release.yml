name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JLine
        run: |
          mkdir -p lib
          wget -q https://repo1.maven.org/maven2/org/jline/jline/3.25.1/jline-3.25.1.jar -O lib/jline.jar

      - name: Build Release
        run: make release

      - name: Create Release Archive
        run: |
          cd release
          tar czf ../luajavane-${{ github.ref_name }}-linux-x86_64.tar.gz *

      - name: Upload Release
        run: |
          gh release create ${{ github.ref_name }} \
            luajavane-${{ github.ref_name }}-linux-x86_64.tar.gz \
            release/luajava.jar \
            release/luajava.so \
            --title "LuaJavaNE ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

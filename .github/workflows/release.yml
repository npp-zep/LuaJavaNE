name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release
        run: |
          make release

      - name: Create Release Archive
        run: |
          # 获取版本号
          VERSION=$(grep '^PROJECT_VERSION' version.properties | cut -d'=' -f2 | tr -d ' ')
          if [ -z "$VERSION" ]; then
            VERSION=${GITHUB_REF_NAME#v}
          fi
          
          cd release
          tar czf ../luajavane-${VERSION}-${{ runner.os }}-${{ matrix.arch }}.tar.gz *

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luajavane-${{ runner.os }}-${{ matrix.arch }}
          path: luajavane-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^PROJECT_VERSION' version.properties | cut -d'=' -f2 | tr -d ' ')
          if [ -z "$VERSION" ]; then
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish Release
        run: |
          # 收集所有平台的 tar.gz 压缩包
          ASSETS=""
          for f in artifacts/*/*.tar.gz; do
            if [ -f "$f" ]; then
              ASSETS="$ASSETS $f"
            fi
          done
          
          if [ -z "$ASSETS" ]; then
            echo "No assets found to upload!"
            exit 1
          fi
          
          gh release create ${{ github.ref_name }} $ASSETS \
            --title "LuaJavaNE ${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
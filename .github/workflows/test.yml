name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JLine
        run: |
          mkdir -p lib
          wget -q https://repo1.maven.org/maven2/org/jline/jline/3.25.1/jline-3.25.1.jar -O lib/jline.jar

      - name: Download JUnit
        run: |
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.1/junit-platform-console-standalone-1.10.1.jar -O lib/junit-standalone.jar

      - name: Build
        run: make

      - name: Run tests
        run: |
          javac -cp out:lib/junit-standalone.jar -d test test/*.java
          java -Dluajava.library.path=$PWD/build/luajava.so \
               -jar lib/junit-standalone.jar \
               --class-path out:test \
               --select-class com.luajava.AllTests
